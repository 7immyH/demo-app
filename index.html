<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: flex-start; width: 100%;">
                <div style="text-align: left;">
                    <h1>Focus Timer v2</h1>
                    <p>Stay productive, beautifully.</p>
                </div>
                <button id="logout-btn" class="secondary-btn"
                    style="padding: 8px 16px; font-size: 14px; border-radius: 8px;">Log Out</button>
            </div>
        </header>

        <main class="timer-card">
            <div class="timer-display" id="time-display">25:00</div>
            <div class="controls">
                <button id="start-btn" class="primary-btn">Start</button>
                <button id="pause-btn" class="secondary-btn">Pause</button>
                <button id="reset-btn" class="secondary-btn">Reset</button>
            </div>
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="work">Work (25m)</button>
                <button class="mode-btn" data-mode="break">Break (5m)</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
